name: Quality Checks

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      allow_format_failure:
        description: Allow formatting check to fail without failing the workflow
        required: false
        type: boolean
        default: false
      allow_test_failure:
        description: Allow test failures without failing the workflow
        required: false
        type: boolean
        default: false
      run_tests:
        description: Run the test suite
        required: false
        type: boolean
        default: true

env:
  MIX_ENV: test
  ELIXIR_VERSION: '1.19.5'
  OTP_VERSION: '28.1.1'
  DB_HOST: localhost
  DB_NAME: elektrine_test
  DB_USER: postgres
  DB_PASSWORD: postgres

jobs:
  quality_checks:
    name: Code Quality (Format + Compile)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: elektrine_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d elektrine_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore deps cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Verify formatting
        id: format_check
        continue-on-error: ${{ inputs.allow_format_failure }}
        run: mix format --check-formatted

      - name: Emit warning when formatting is allowed to fail
        if: ${{ inputs.allow_format_failure && steps.format_check.outcome == 'failure' }}
        run: echo "::warning::Formatting check failed, but deploy can continue."

      - name: Compile with warnings treated as errors
        run: mix compile --warnings-as-errors

      - name: Run Credo
        run: mix credo --strict

      - name: Run test suite
        if: ${{ inputs.run_tests }}
        id: test_suite
        continue-on-error: ${{ inputs.allow_test_failure }}
        run: mix test

      - name: Emit warning when tests are allowed to fail
        if: ${{ inputs.run_tests && inputs.allow_test_failure && steps.test_suite.outcome == 'failure' }}
        run: echo "::warning::Test suite failed, but deploy can continue."
