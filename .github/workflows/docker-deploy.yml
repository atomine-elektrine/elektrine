name: Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality_gate:
    name: Quality Gate
    uses: ./.github/workflows/ci.yml
    with:
      allow_format_failure: true

  build_and_publish_image:
    name: Build and Publish Image
    needs: quality_gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      BUILD_PRIMARY_DOMAIN: ${{ vars.DOCKER_BUILD_PRIMARY_DOMAIN || secrets.DOCKER_BUILD_PRIMARY_DOMAIN || 'example.com' }}
      BUILD_EMAIL_DOMAIN: ${{ vars.DOCKER_BUILD_EMAIL_DOMAIN || secrets.DOCKER_BUILD_EMAIL_DOMAIN || 'example.com' }}
      BUILD_SUPPORTED_DOMAINS: ${{ vars.DOCKER_BUILD_SUPPORTED_DOMAINS || secrets.DOCKER_BUILD_SUPPORTED_DOMAINS || 'example.com' }}
      BUILD_PROFILE_BASE_DOMAINS: ${{ vars.DOCKER_BUILD_PROFILE_BASE_DOMAINS || secrets.DOCKER_BUILD_PROFILE_BASE_DOMAINS || 'example.com' }}
      ELEKTRINE_ENABLED_MODULES: ${{ vars.ELEKTRINE_ENABLED_MODULES || secrets.ELEKTRINE_ENABLED_MODULES || vars.ELEKTRINE_RELEASE_MODULES || secrets.ELEKTRINE_RELEASE_MODULES || 'all' }}
      ELEKTRINE_RELEASE_MODULES: ${{ vars.ELEKTRINE_RELEASE_MODULES || secrets.ELEKTRINE_RELEASE_MODULES || '' }}

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELEASE_NAME=elektrine
            ELEKTRINE_RELEASE_MODULES=${{ env.ELEKTRINE_RELEASE_MODULES || env.ELEKTRINE_ENABLED_MODULES }}
            PRIMARY_DOMAIN=${{ env.BUILD_PRIMARY_DOMAIN }}
            EMAIL_DOMAIN=${{ env.BUILD_EMAIL_DOMAIN }}
            SUPPORTED_DOMAINS=${{ env.BUILD_SUPPORTED_DOMAINS }}
            PROFILE_BASE_DOMAINS=${{ env.BUILD_PROFILE_BASE_DOMAINS }}

  deploy_to_docker:
    name: Deploy Application
    needs: build_and_publish_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/elektrine' }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH || 'main' }}
      ELEKTRINE_ENABLED_MODULES: ${{ vars.ELEKTRINE_ENABLED_MODULES || secrets.ELEKTRINE_ENABLED_MODULES || vars.ELEKTRINE_RELEASE_MODULES || secrets.ELEKTRINE_RELEASE_MODULES || 'all' }}
      ELEKTRINE_RELEASE_MODULES: ${{ vars.ELEKTRINE_RELEASE_MODULES || secrets.ELEKTRINE_RELEASE_MODULES || '' }}
      DOCKER_PROFILES: ${{ secrets.DOCKER_PROFILES || secrets.BAREMETAL_PROFILES || 'caddy' }}
      TARGET_IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
      DEPLOY_REF: ${{ github.sha }}
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Validate deploy settings
        run: |
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error::Missing deploy settings. Set DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY repository/org secrets."
            exit 1
          fi

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          PROFILE_ARGS=""
          for profile in ${DOCKER_PROFILES}; do
            PROFILE_ARGS="$PROFILE_ARGS --profile $profile"
          done

          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_REF='$DEPLOY_REF' TARGET_IMAGE='$TARGET_IMAGE' ELEKTRINE_ENABLED_MODULES='$ELEKTRINE_ENABLED_MODULES' ELEKTRINE_RELEASE_MODULES='$ELEKTRINE_RELEASE_MODULES' PROFILE_ARGS='$PROFILE_ARGS' bash -s" <<'EOF'
          set -euo pipefail

          if docker info >/dev/null 2>&1; then
            DEPLOY_PREFIX=""
          elif sudo -n docker info >/dev/null 2>&1; then
            DEPLOY_PREFIX="sudo -n"
          else
            echo "No Docker access for deploy user"
            exit 1
          fi

          cd "$DEPLOY_PATH"
          git fetch --all --tags

          WORKTREE_PATH="$DEPLOY_PATH/.deploy-worktree"

          OUTPUT_FILE="$WORKTREE_PATH/deploy/docker/generated.docker.yml"
          OVERRIDE_FILE="$(mktemp /tmp/elektrine.docker-image.override.XXXXXX.yml)"
          trap 'git -C "$DEPLOY_PATH" worktree remove --force "$WORKTREE_PATH" >/dev/null 2>&1 || rm -rf "$WORKTREE_PATH"; rm -f "$OVERRIDE_FILE"' EXIT

          if [ -d "$WORKTREE_PATH" ]; then
            git worktree remove --force "$WORKTREE_PATH" >/dev/null 2>&1 || rm -rf "$WORKTREE_PATH"
          fi

          git worktree add --force --detach "$WORKTREE_PATH" "$DEPLOY_REF"
          ln -sfn "$DEPLOY_PATH/.env.production" "$WORKTREE_PATH/.env.production"
          cd "$WORKTREE_PATH"

          cat > "$OVERRIDE_FILE" <<OVERRIDE
          services:
            app:
              image: ${TARGET_IMAGE}
            worker:
              image: ${TARGET_IMAGE}
            mail:
              image: ${TARGET_IMAGE}
            dns:
              image: ${TARGET_IMAGE}
          OVERRIDE

          COMPOSE_PROJECT_NAME="docker" COMPOSE_PROJECT_DIRECTORY="$WORKTREE_PATH/deploy/docker" bash scripts/deploy/docker_deploy.sh \
            --modules "$ELEKTRINE_ENABLED_MODULES" \
            --env-file "$DEPLOY_PATH/.env.production" \
            --output "$OUTPUT_FILE" \
            --pull \
            --skip-build \
            --compose-override "$OVERRIDE_FILE" \
            $PROFILE_ARGS
          EOF

      - name: Health check
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "bash -s" <<EOF
          set -euo pipefail
          if docker info >/dev/null 2>&1; then
            DOCKER_CMD="docker"
          else
            DOCKER_CMD="sudo -n docker"
          fi
          cd "$DEPLOY_PATH"
          \$DOCKER_CMD compose -f /tmp/elektrine.generated.docker.yml ps || \$DOCKER_CMD ps
          EOF
