<!doctype html>
<html lang="en" class="popup-page">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elektrine Nerve</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-page">
    <main class="app-shell popup-shell">
      <section class="launcher">
        <span class="eyebrow">Nerve</span>
        <h1 id="launcherTitle">Checking status...</h1>
        <p id="launcherSummary">Loading your browser session.</p>

        <div class="hero-chip">
          <strong>Current site:</strong>
          <span id="currentSiteLabel">Checking tab...</span>
        </div>

        <div id="feedback" class="feedback hidden launcher-feedback" role="status" aria-live="polite"></div>

        <section class="capture-panel" aria-labelledby="captureTitle">
          <div>
            <span class="eyebrow">Kairo Capture</span>
            <h2 id="captureTitle">Clip this page</h2>
            <p id="captureSummary">Selected text is saved as a note. Otherwise the page URL is saved.</p>
          </div>
          <button id="captureButton" class="button secondary" type="button">Capture</button>
        </section>

        <div class="launcher-actions">
          <button id="primaryButton" class="button launcher-primary" type="button">Open manager</button>
          <button id="openOptionsButton" class="button secondary" type="button">Settings</button>
        </div>
      </section>
    </main>

    <script type="module" src="launcher.js"></script>
  </body>
</html>
