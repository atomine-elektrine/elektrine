version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: elektrine_db
    environment:
      POSTGRES_USER: elektrine
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: elektrine_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - elektrine_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elektrine -d elektrine_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        RELEASE_NAME: ${RELEASE_NAME:-elektrine}
        ELEKTRINE_RELEASE_MODULES: ${ELEKTRINE_RELEASE_MODULES:-chat,social,vault,vpn}
        PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:-localhost}
        EMAIL_DOMAIN: ${EMAIL_DOMAIN:-${PRIMARY_DOMAIN:-localhost}}
        SUPPORTED_DOMAINS: ${SUPPORTED_DOMAINS:-${PRIMARY_DOMAIN:-localhost}}
        PROFILE_BASE_DOMAINS: ${PROFILE_BASE_DOMAINS:-${PRIMARY_DOMAIN:-localhost}}
    container_name: elektrine_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env.production
    environment:
      DATABASE_URL: ecto://elektrine:${DB_PASSWORD:-changeme}@postgres/elektrine_prod
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SERVER: "true"
      MIX_ENV: prod
      ELEKTRINE_ENABLED_MODULES: ${ELEKTRINE_ENABLED_MODULES:-chat,social,vault,vpn}
    ports:
      - "${APP_HTTP_BIND:-8080:8080}"
    volumes:
      - app_data:/data
      - uploads:/data/uploads
    networks:
      - elektrine_network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
  app_data:

networks:
  elektrine_network:
    driver: bridge
