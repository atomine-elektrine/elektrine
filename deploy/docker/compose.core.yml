version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: elektrine_db
    command:
      [
        "postgres",
        "-c",
        "shared_preload_libraries=pg_stat_statements",
        "-c",
        "pg_stat_statements.max=10000",
        "-c",
        "pg_stat_statements.track=all"
      ]
    environment:
      POSTGRES_USER: elektrine
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      POSTGRES_DB: elektrine_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - elektrine_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elektrine -d elektrine_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        RELEASE_NAME: ${RELEASE_NAME:-elektrine}
        ELEKTRINE_RELEASE_MODULES: ${ELEKTRINE_RELEASE_MODULES:-chat,social,vault}
        PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:-localhost}
        EMAIL_DOMAIN: ${EMAIL_DOMAIN:-${PRIMARY_DOMAIN:-localhost}}
        SUPPORTED_DOMAINS: ${SUPPORTED_DOMAINS:-${PRIMARY_DOMAIN:-localhost}}
        PROFILE_BASE_DOMAINS: ${PROFILE_BASE_DOMAINS:-${PRIMARY_DOMAIN:-localhost}}
    container_name: elektrine_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env.production
    environment:
      DATABASE_URL: ecto://elektrine:${DB_PASSWORD:?set DB_PASSWORD}@postgres/elektrine_prod
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SERVER: "true"
      PORT: ${PORT:-8080}
      MIX_ENV: prod
      ELEKTRINE_ENABLED_MODULES: ${ELEKTRINE_ENABLED_MODULES:-chat,social,vault}
      ACME_HOME: ${ACME_HOME:-/data/acme.sh}
      ACME_WILDCARD_RENEWAL_ENABLED: ${ACME_WILDCARD_RENEWAL_ENABLED:-false}
      ACME_RENEW_COMMAND: ${ACME_RENEW_COMMAND:-/data/acme.sh/acme.sh --cron --home /data/acme.sh}
      ELEKTRINE_API_BASE: ${ELEKTRINE_API_BASE:-http://app:8080}
      CADDY_TLS_MOUNT_DIR: ${CADDY_TLS_MOUNT_DIR:-/opt/elektrine/certs}
      RELOAD_CMD: ${ACME_RELOAD_CMD:-true}
    ports:
      - "${APP_HTTP_BIND:-8080:8080}"
    volumes:
      - app_data:/data
      - uploads:/data/uploads
      - ${CADDY_TLS_MOUNT_DIR:-/opt/elektrine/certs}:/opt/elektrine/certs
    networks:
      - elektrine_network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
  app_data:

networks:
  elektrine_network:
    driver: bridge
