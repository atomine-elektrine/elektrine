version: '3.8'

services:
  caddy_edge:
    image: caddy:2.10.2
    container_name: elektrine_caddy_edge
    depends_on:
      app:
        condition: service_started
    env_file:
      - ../../.env.production
    environment:
      ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@example.com}
      CADDY_ASK_URL: ${CADDY_ASK_URL:-http://app:8080/_edge/tls/v1/allow}
      ORIGIN_UPSTREAM: ${CADDY_ORIGIN_UPSTREAM:-app:8080}
    ports:
      - "${CADDY_HTTP_BIND:-80:80}"
      - "${CADDY_HTTPS_BIND:-443:443}"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - elektrine_network
    restart: unless-stopped

volumes:
  caddy_data:

networks:
  elektrine_network:
    driver: bridge
