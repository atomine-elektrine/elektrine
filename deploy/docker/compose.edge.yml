version: '3.8'

services:
  caddy_edge:
    build:
      context: ../..
      dockerfile: deploy/caddy/Dockerfile
    container_name: elektrine_caddy_edge
    depends_on:
      app:
        condition: service_started
    env_file:
      - ../../.env.production
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      CADDY_ASK_URL: ${CADDY_ASK_URL:-http://app:8080/_edge/tls/v1/allow}
      CADDY_EDGE_API_KEY: ${CADDY_EDGE_API_KEY:-}
      CADDY_ADMIN_HOST: ${CADDY_ADMIN_HOST:-admin.elektrine.com}
      NETBIRD_ALLOWED_CIDRS: ${NETBIRD_ALLOWED_CIDRS:-192.0.2.0/32}
      ORIGIN_UPSTREAM: ${CADDY_ORIGIN_UPSTREAM:-app:8080}
    ports:
      - "${CADDY_HTTP_BIND:-80:80}"
      - "${CADDY_HTTPS_BIND:-443:443}"
    volumes:
      - ${CADDY_CONFIG_PATH:-../caddy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - ${CADDY_TLS_MOUNT_DIR:-/opt/elektrine/certs}:/opt/elektrine/certs:ro
      - caddy_data:/data
    networks:
      - elektrine_network
    restart: unless-stopped

volumes:
  caddy_data:

networks:
  elektrine_network:
    driver: bridge
