version: '3.8'

services:
  caddy_edge:
    build:
      context: ../..
      dockerfile: deploy/caddy/Dockerfile
    container_name: elektrine_caddy_edge
    depends_on:
      app:
        condition: service_healthy
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      CADDY_ASK_URL: ${CADDY_ASK_URL:-http://app_proxy:8080/_edge/tls/v1/allow}
      CADDY_ADMIN_HOST: ${CADDY_ADMIN_HOST:-admin.elektrine.com}
      CADDY_PROXY_PROTOCOL_ALLOWED_CIDRS: ${CADDY_PROXY_PROTOCOL_ALLOWED_CIDRS:-192.0.2.0/32}
      NETBIRD_ALLOWED_CIDRS: ${NETBIRD_ALLOWED_CIDRS:-192.0.2.0/32}
      ORIGIN_UPSTREAM: ${CADDY_ORIGIN_UPSTREAM:-app_proxy:8080}
    ports:
      - "${CADDY_HTTP_BIND:-80:80}"
      - "${CADDY_HTTPS_BIND:-443:443}"
    volumes:
      - ${CADDY_CONFIG_PATH:-../caddy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - ${CADDY_TLS_MOUNT_DIR:-/opt/elektrine/certs}:/opt/elektrine/certs:ro
      - caddy_data:/data
    networks:
      elektrine_network:
      caddy_proxy_network:
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  caddy_data:

networks:
  elektrine_network:
    driver: bridge
  caddy_proxy_network:
    driver: bridge
    ipam:
      config:
        - subnet: ${CADDY_PROXY_DOCKER_SUBNET:-172.30.0.0/24}
