services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: elektrine_db
    environment:
      POSTGRES_USER: elektrine
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: elektrine_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_BIND:-127.0.0.1:5432:5432}"
    networks:
      - elektrine_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elektrine -d elektrine_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        RELEASE_NAME: ${RELEASE_NAME:-elektrine}
        ELEKTRINE_RELEASE_MODULES: ${ELEKTRINE_RELEASE_MODULES:-all}
        PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:-example.com}
        EMAIL_DOMAIN: ${EMAIL_DOMAIN:-${PRIMARY_DOMAIN:-example.com}}
        SUPPORTED_DOMAINS: ${SUPPORTED_DOMAINS:-${PRIMARY_DOMAIN:-example.com}}
        PROFILE_BASE_DOMAINS: ${PROFILE_BASE_DOMAINS:-${PRIMARY_DOMAIN:-example.com}}
    container_name: elektrine_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env.production
    environment:
      DATABASE_URL: ecto://elektrine:${DB_PASSWORD:-changeme}@postgres/elektrine_prod
      POOL_SIZE: ${APP_POOL_SIZE:-10}
      PHX_HOST: ${PHX_HOST:-example.com}
      PHX_SERVER: "true"
      MIX_ENV: prod
      ELEKTRINE_RUNTIME_ROLE: app
      ELEKTRINE_ENABLED_MODULES: ${ELEKTRINE_ENABLED_MODULES:-all}
      ELEKTRINE_ENABLE_MAIL: "false"
      ELEKTRINE_ENABLE_TOR: ${ELEKTRINE_ENABLE_TOR:-false}
      TURN_ENABLED: ${TURN_ENABLED:-false}
      ONION_TLS_ENABLED: ${ONION_TLS_ENABLED:-true}
      MIGRATION_POOL_SIZE: ${MIGRATION_POOL_SIZE:-2}
    ports:
      - "${APP_HTTP_BIND:-127.0.0.1:8080:8080}"
    volumes:
      - app_data:/data
      - uploads:/data/uploads
    networks:
      - elektrine_network
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        RELEASE_NAME: ${RELEASE_NAME:-elektrine}
        ELEKTRINE_RELEASE_MODULES: ${ELEKTRINE_RELEASE_MODULES:-all}
        PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:-example.com}
        EMAIL_DOMAIN: ${EMAIL_DOMAIN:-${PRIMARY_DOMAIN:-example.com}}
        SUPPORTED_DOMAINS: ${SUPPORTED_DOMAINS:-${PRIMARY_DOMAIN:-example.com}}
        PROFILE_BASE_DOMAINS: ${PROFILE_BASE_DOMAINS:-${PRIMARY_DOMAIN:-example.com}}
    container_name: elektrine_worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env.production
    environment:
      DATABASE_URL: ecto://elektrine:${DB_PASSWORD:-changeme}@postgres/elektrine_prod
      POOL_SIZE: ${WORKER_POOL_SIZE:-5}
      PHX_HOST: ${PHX_HOST:-example.com}
      MIX_ENV: prod
      ELEKTRINE_RUNTIME_ROLE: worker
      ELEKTRINE_ENABLED_MODULES: ${ELEKTRINE_ENABLED_MODULES:-all}
      ELEKTRINE_ENABLE_MAIL: "false"
      ELEKTRINE_ENABLE_TOR: "false"
      TURN_ENABLED: ${TURN_ENABLED:-false}
      MIGRATION_POOL_SIZE: ${MIGRATION_POOL_SIZE:-2}
    volumes:
      - app_data:/data
      - uploads:/data/uploads
    networks:
      - elektrine_network
    restart: unless-stopped

  vpn:
    profiles: ["vpn"]
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        RELEASE_NAME: ${RELEASE_NAME:-elektrine}
        ELEKTRINE_RELEASE_MODULES: ${ELEKTRINE_RELEASE_MODULES:-all}
        PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:-example.com}
        EMAIL_DOMAIN: ${EMAIL_DOMAIN:-${PRIMARY_DOMAIN:-example.com}}
        SUPPORTED_DOMAINS: ${SUPPORTED_DOMAINS:-${PRIMARY_DOMAIN:-example.com}}
        PROFILE_BASE_DOMAINS: ${PROFILE_BASE_DOMAINS:-${PRIMARY_DOMAIN:-example.com}}
    container_name: elektrine_vpn
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env.production
    environment:
      DATABASE_URL: ecto://elektrine:${DB_PASSWORD:-changeme}@127.0.0.1/elektrine_prod
      POOL_SIZE: ${VPN_POOL_SIZE:-2}
      MIX_ENV: prod
      ELEKTRINE_RUNTIME_ROLE: vpn
      ELEKTRINE_ENABLED_MODULES: ${ELEKTRINE_ENABLED_MODULES:-all}
      ELEKTRINE_ENABLE_WEB: "false"
      ELEKTRINE_ENABLE_JOBS: "false"
      ELEKTRINE_ENABLE_MAIL: "false"
      ELEKTRINE_ENABLE_TOR: "false"
      VPN_SELFHOST_NODE: "true"
      VPN_SELFHOST_WG_INTERFACE: ${VPN_SELFHOST_WG_INTERFACE:-wg0}
      VPN_SELFHOST_ADDRESS: ${VPN_SELFHOST_ADDRESS:-10.8.0.1/24}
      VPN_SELFHOST_LISTEN_PORT: ${VPN_SELFHOST_LISTEN_PORT:-51820}
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - app_data:/data
      - uploads:/data/uploads
    restart: unless-stopped

  mail:
    profiles: ["email"]
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        RELEASE_NAME: ${RELEASE_NAME:-elektrine}
        ELEKTRINE_RELEASE_MODULES: ${ELEKTRINE_RELEASE_MODULES:-all}
        PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:-example.com}
        EMAIL_DOMAIN: ${EMAIL_DOMAIN:-${PRIMARY_DOMAIN:-example.com}}
        SUPPORTED_DOMAINS: ${SUPPORTED_DOMAINS:-${PRIMARY_DOMAIN:-example.com}}
        PROFILE_BASE_DOMAINS: ${PROFILE_BASE_DOMAINS:-${PRIMARY_DOMAIN:-example.com}}
    container_name: elektrine_mail
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env.production
    environment:
      DATABASE_URL: ecto://elektrine:${DB_PASSWORD:-changeme}@postgres/elektrine_prod
      POOL_SIZE: ${MAIL_POOL_SIZE:-5}
      PHX_HOST: ${PHX_HOST:-example.com}
      MIX_ENV: prod
      ELEKTRINE_RUNTIME_ROLE: mail
      ELEKTRINE_ENABLED_MODULES: ${ELEKTRINE_ENABLED_MODULES:-all}
      ELEKTRINE_ENABLE_MAIL: ${ELEKTRINE_ENABLE_MAIL:-true}
      ELEKTRINE_ENABLE_TOR: "false"
      IMAPS_PORT: 2993
      POP3S_PORT: 2995
    volumes:
      - app_data:/data
      - uploads:/data/uploads
      - ${MAIL_TLS_MOUNT_DIR:-/opt/elektrine/certs}:/opt/elektrine/certs:ro
    networks:
      - elektrine_network
    ports:
      - "${IMAP_BIND:-143:2143}"
      - "${POP3_BIND:-110:2110}"
      - "${IMAP_TLS_BIND:-993:2993}"
      - "${POP3_TLS_BIND:-995:2995}"
    restart: unless-stopped

  dns:
    profiles: ["dns"]
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        RELEASE_NAME: ${RELEASE_NAME:-elektrine}
        ELEKTRINE_RELEASE_MODULES: ${ELEKTRINE_RELEASE_MODULES:-all}
        PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:-localhost}
        EMAIL_DOMAIN: ${EMAIL_DOMAIN:-${PRIMARY_DOMAIN:-localhost}}
        SUPPORTED_DOMAINS: ${SUPPORTED_DOMAINS:-${PRIMARY_DOMAIN:-localhost}}
        PROFILE_BASE_DOMAINS: ${PROFILE_BASE_DOMAINS:-${PRIMARY_DOMAIN:-localhost}}
    container_name: elektrine_dns
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env.production
    environment:
      DATABASE_URL: ecto://elektrine:${DB_PASSWORD:-changeme}@postgres/elektrine_prod
      POOL_SIZE: ${DNS_POOL_SIZE:-3}
      MIX_ENV: prod
      RELEASE_NAME: ${RELEASE_NAME:-elektrine}
      ELEKTRINE_ENABLED_MODULES: ${ELEKTRINE_ENABLED_MODULES:-all}
      ELEKTRINE_RUNTIME_ROLE: worker
      ELEKTRINE_ENABLE_WEB: "false"
      ELEKTRINE_ENABLE_JOBS: "false"
      ELEKTRINE_ENABLE_MAIL: "false"
      ELEKTRINE_ENABLE_TOR: "false"
      DNS_AUTHORITY_ENABLED: "true"
      DNS_RECURSIVE_ENABLED: ${DNS_RECURSIVE_ENABLED:-true}
    ports:
      - "${DNS_UDP_BIND:-53:5300/udp}"
      - "${DNS_TCP_BIND:-53:5300/tcp}"
    volumes:
      - app_data:/data
    networks:
      - elektrine_network
    restart: unless-stopped

  turn:
    image: ${TURN_IMAGE:-coturn/coturn}
    container_name: elektrine_turn
    profiles:
      - turn
    env_file:
      - ../../.env.production
    environment:
      TURN_HOST: ${TURN_HOST:-${PRIMARY_DOMAIN:-example.com}}
      TURN_PORT: ${TURN_PORT:-3478}
      TURN_MIN_PORT: ${TURN_MIN_PORT:-49160}
      TURN_MAX_PORT: ${TURN_MAX_PORT:-49200}
      TURN_REALM: ${TURN_REALM:-${PRIMARY_DOMAIN:-example.com}}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-}
    network_mode: host
    command: >-
      /bin/sh -ec '
      secret="${TURN_SHARED_SECRET:-$ELEKTRINE_MASTER_SECRET}";
      if [ -z "$secret" ]; then
        echo "TURN_SHARED_SECRET or ELEKTRINE_MASTER_SECRET is required for the turn profile" >&2;
        exit 1;
      fi;
      set -- turnserver
        --no-cli
        --fingerprint
        --use-auth-secret
        --static-auth-secret="$secret"
        --realm="${TURN_REALM}"
        --server-name="${TURN_REALM}"
        --listening-ip=0.0.0.0
        --relay-ip=0.0.0.0
        --listening-port="${TURN_PORT}"
        --min-port="${TURN_MIN_PORT}"
        --max-port="${TURN_MAX_PORT}"
        --lt-cred-mech
        --stale-nonce
        --no-tls
        --no-dtls
        --simple-log;
      if [ -n "${TURN_EXTERNAL_IP:-}" ]; then
        set -- "$@" --external-ip="${TURN_EXTERNAL_IP}";
      fi;
      exec "$@"'
    restart: unless-stopped

  caddy_edge:
    build:
      context: ../..
      dockerfile: deploy/caddy/Dockerfile
    container_name: elektrine_caddy_edge
    profiles:
      - caddy
    depends_on:
      app:
        condition: service_started
    env_file:
      - ../../.env.production
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      CADDY_ASK_URL: ${CADDY_ASK_URL:-http://app:8080/_edge/tls/v1/allow}
      ORIGIN_UPSTREAM: ${CADDY_ORIGIN_UPSTREAM:-app:8080}
    ports:
      - "${CADDY_HTTP_BIND:-80:80}"
      - "${CADDY_HTTPS_BIND:-443:443}"
    volumes:
      - ${CADDY_CONFIG_PATH:-../caddy/Caddyfile.baremetal}:/etc/caddy/Caddyfile:ro
      - ${CADDY_TLS_MOUNT_DIR:-/opt/elektrine/certs}:/opt/elektrine/certs:ro
      - caddy_data:/data
    networks:
      - elektrine_network
    restart: unless-stopped

  bluesky_pds:
    image: ghcr.io/bluesky-social/pds:0.4
    container_name: elektrine_bluesky_pds
    profiles:
      - bluesky
    environment:
      PDS_HOSTNAME: ${BLUESKY_MANAGED_DOMAIN:-bsky.local}
      PDS_JWT_SECRET: ${BLUESKY_PDS_JWT_SECRET:?set BLUESKY_PDS_JWT_SECRET}
      PDS_ADMIN_PASSWORD: ${BLUESKY_MANAGED_ADMIN_PASSWORD:?set BLUESKY_MANAGED_ADMIN_PASSWORD}
      PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: ${BLUESKY_PDS_ROTATION_KEY_HEX:-}
      PDS_DATA_DIRECTORY: /pds
      PDS_BLOBSTORE_DISK_LOCATION: /pds/blocks
      PDS_BLOB_UPLOAD_LIMIT: 52428800
      PDS_DID_PLC_URL: "https://plc.directory"
      PDS_BSKY_APP_VIEW_URL: "https://api.bsky.app"
      PDS_BSKY_APP_VIEW_DID: "did:web:api.bsky.app"
      PDS_REPORT_SERVICE_URL: "https://mod.bsky.app"
      PDS_REPORT_SERVICE_DID: "did:plc:ar7c4by46qjdydhdevvrndac"
      PDS_CRAWLERS: "https://bsky.network"
      LOG_ENABLED: true
    ports:
      - "${BLUESKY_PDS_PORT:-3000}:3000"
    volumes:
      - bluesky_pds_data:/pds
    networks:
      - elektrine_network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
  app_data:
  caddy_data:
  bluesky_pds_data:

networks:
  elektrine_network:
    driver: bridge
