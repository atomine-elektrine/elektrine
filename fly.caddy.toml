app = "elektrine-caddy-edge"
primary_region = "ord"
kill_signal = "SIGTERM"

[build]
  image = "caddy:2.10.2"

[env]
  ACME_EMAIL = "security@elektrine.com"
  CADDY_ASK_URL = "http://elektrine.internal:8080/_edge/tls/v1/allow"
  ORIGIN_UPSTREAM = "elektrine.internal:8080"

[[files]]
  guest_path = "/etc/caddy/Caddyfile"
  local_path = "Caddyfile"

[[mounts]]
  source = "caddy_data"
  destination = "/data"

[[services]]
  internal_port = 80
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[services]]
  internal_port = 443
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
