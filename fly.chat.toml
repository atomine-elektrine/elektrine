# Chat-only Fly app config (separate from main fly.toml)
# Update `app` and `PHX_HOST` before first deploy.

app = 'elektrine-chat'
primary_region = 'iad'
kill_signal = 'SIGTERM'

[build]
  [build.args]
    RELEASE_NAME = 'elektrine_chat_auth'

[deploy]
  release_command = '/app/bin/elektrine_chat_auth eval "Elektrine.Release.migrate"'

[env]
  PHX_HOST = 'chat.example.com'
  ELEKTRINE_RUNTIME_PROFILE = 'chat_auth'
  ECTO_IPV6 = 'true'
  POOL_SIZE = '10'
  DB_QUEUE_TARGET_MS = '2000'
  DB_QUEUE_INTERVAL_MS = '5000'
  DB_TIMEOUT_MS = '30000'
  DB_POOL_TIMEOUT_MS = '30000'
  DB_CONNECT_TIMEOUT_MS = '30000'
  MIGRATION_POOL_SIZE = '2'
  MIGRATION_TIMEOUT_MS = '120000'
  MIGRATION_POOL_TIMEOUT_MS = '60000'
  MIGRATION_CONNECT_TIMEOUT_MS = '60000'
  MIGRATION_DB_RETRIES = '30'
  MIGRATION_RETRY_DELAY_MS = '3000'

[[services]]
  internal_port = 8080
  protocol = 'tcp'
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

  [services.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2

# Optional but recommended for Tor identity/certs persistence used by start scripts
[[mounts]]
  source = 'app_data'
  destination = '/data'
